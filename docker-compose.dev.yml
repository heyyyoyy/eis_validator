# Development — Vite dev server (HMR), source bind-mounts, debug logging.
#   docker compose -f docker-compose.dev.yml up --build

name: eis_assistant

services:

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      HOST: "0.0.0.0"
      PORT: "${PORT:-3000}"
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      RUST_BACKTRACE: "1"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      EMBEDDING_NDIMS: "${EMBEDDING_NDIMS:-1536}"
      COMPLETION_MODEL: "${COMPLETION_MODEL:-gpt-4o-mini}"
      QDRANT_URL: "http://qdrant:${QDRANT_PORT:-6334}"
      QDRANT_API_KEY: "${QDRANT_API_KEY:-}"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-eis_documents}"
    depends_on:
      qdrant:
        condition: service_healthy
    expose:
      - "${PORT:-3000}"
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: builder
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      BACKEND_PORT: "${PORT:-3000}"
      VITE_PROXY_TARGET: "http://backend:${PORT:-3000}"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:cached
      - npm-cache:/app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  npm-cache:
  qdrant_storage:
