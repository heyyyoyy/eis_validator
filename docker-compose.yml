name: eis_validator

services:

  # ── Rust/Axum backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      HOST: "0.0.0.0"
      PORT: "${PORT:-3000}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    expose:
      - "${PORT:-3000}"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── React/nginx frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    environment:
      BACKEND_PORT: "${PORT:-3000}"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
