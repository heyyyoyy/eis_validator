name: eis_validator

services:

  # ── One-shot cert generation ─────────────────────────────────────────────────
  cert-gen:
    image: alpine/openssl:latest
    volumes:
      - certs:/certs
      - ./docker/generate_certs.sh:/usr/local/bin/generate_certs.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/generate_certs.sh"]
    environment:
      CERTS_DIR: /certs
      CERT_DAYS: "365"
      CERT_SUBJECT: /CN=localhost
      CERT_SAN: "DNS:localhost,DNS:frontend,IP:127.0.0.1"
    networks:
      - app-net
    restart: "no"

  # ── Rust/Axum backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      HOST: "0.0.0.0"
      PORT: "${PORT:-3000}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      USE_TLS: "false"
    expose:
      - "3000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── React/nginx frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    volumes:
      - certs:/etc/nginx/certs:ro
    depends_on:
      cert-gen:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

networks:
  app-net:
    driver: bridge

volumes:
  certs:
