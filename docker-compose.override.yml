# Development overrides — loaded automatically by `docker compose up`
# The frontend runs the Vite dev server for hot-module replacement.

services:

  backend:
    environment:
      LOG_LEVEL: debug
      RUST_BACKTRACE: "1"
    # Expose backend directly for debugging / curl tests
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

  frontend:
    # Override to run Vite dev server instead of nginx
    build:
      target: builder
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      VITE_PROXY_TARGET: "http://backend:${PORT:-3000}"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:cached
      - npm-cache:/app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  npm-cache:
