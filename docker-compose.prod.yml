# Production — nginx + TLS (certs from one-shot cert-gen), resource limits.
#   docker compose -f docker-compose.prod.yml up --build -d

name: eis_assistant

services:

  qdrant:
    image: qdrant/qdrant:latest
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  cert-gen:
    image: alpine/openssl:latest
    volumes:
      - certs:/certs
      - ./docker/generate_certs.sh:/usr/local/bin/generate_certs.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/generate_certs.sh"]
    environment:
      CERTS_DIR: "${CERTS_DIR:-/certs}"
      CERT_DAYS: "${CERT_DAYS:-365}"
      CERT_SUBJECT: "${CERT_SUBJECT:-/CN=localhost}"
      CERT_SAN: "${CERT_SAN:-DNS:localhost,DNS:frontend,IP:127.0.0.1}"
    networks:
      - app-net
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      HOST: "0.0.0.0"
      PORT: "${PORT:-3000}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      EMBEDDING_NDIMS: "${EMBEDDING_NDIMS:-1536}"
      COMPLETION_MODEL: "${COMPLETION_MODEL:-gpt-4o-mini}"
      QDRANT_URL: "http://qdrant:${QDRANT_PORT:-6334}"
      QDRANT_API_KEY: "${QDRANT_API_KEY:-}"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-eis_documents}"
    depends_on:
      qdrant:
        condition: service_healthy
    expose:
      - "${PORT:-3000}"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    environment:
      BACKEND_PORT: "${PORT:-3000}"
    depends_on:
      cert-gen:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped
    volumes:
      - certs:/etc/nginx/certs:ro
    ports:
      - "${HTTP_PORT:-80}:8080"
      - "${HTTPS_PORT:-443}:8443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          cpus: "0.1"
          memory: 16M

networks:
  app-net:
    driver: bridge

volumes:
  certs:
  qdrant_storage:
