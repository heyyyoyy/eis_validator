# Production overrides — apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:

  cert-gen:
    restart: "no"

  backend:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M

  frontend:
    restart: unless-stopped
    # Host ports are read from HTTP_PORT / HTTPS_PORT in .env (or shell env).
    # Defaults to 80 and 443 when not set.
    ports:
      - "${HTTP_PORT:-80}:8080"
      - "${HTTPS_PORT:-443}:8443"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          cpus: "0.1"
          memory: 16M
